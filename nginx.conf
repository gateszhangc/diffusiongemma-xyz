server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location ~* \.(?:ico|svg|png|jpg|jpeg|gif|webp|css|js)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
